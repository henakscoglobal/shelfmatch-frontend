<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShelfMatch</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0F3D2E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1A1A1A;
      --forest: #0F3D2E;
      --forest-soft: #3D6B52;
      --parchment: #F6F1E4;
      --parchment-dim: #EDE5D2;
      --brass: #C9A227;
      --brass-soft: #E4C766;
      --rust: #B5482A;
      --line: rgba(15,61,46,0.16);
      --shadow: 0 12px 30px rgba(15,61,46,0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--parchment);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .mono { font-family: 'IBM Plex Mono', monospace; }
    .display { font-family: 'Fraunces', serif; }

    .eyebrow {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10.5px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--forest-soft);
      font-weight: 600;
    }

    .top-bar {
      background: var(--forest);
      padding: 24px 20px 22px;
      color: var(--parchment);
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-mark {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      background: var(--parchment);
      color: var(--forest);
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 600;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .top-bar .brand {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 25px;
      letter-spacing: -0.01em;
      margin: 0;
    }

    .top-bar .tagline {
      font-size: 13px;
      color: rgba(246,241,228,0.72);
      margin-top: 8px;
      line-height: 1.5;
    }

    .register-row {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }

    .register-btn {
      flex: 1;
      padding: 11px;
      border: 1px solid rgba(246,241,228,0.4);
      border-radius: 100px;
      background: transparent;
      color: var(--parchment);
      font-size: 12.5px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
    }

    /* Ledger stitch divider */
    .stitch {
      height: 1px;
      width: 100%;
      background-image: repeating-linear-gradient(to right, var(--forest) 0 8px, transparent 8px 14px);
      opacity: 0.3;
    }

    .section {
      padding: 26px 16px 6px;
    }

    .section-header {
      margin-bottom: 16px;
    }

    .section-header .eyebrow {
      display: block;
      margin-bottom: 4px;
    }

    .section-header-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .section-header h2 {
      font-family: 'Fraunces', serif;
      font-size: 21px;
      font-weight: 600;
      margin: 0;
      color: var(--ink);
      letter-spacing: -0.01em;
    }

    .section-header .count {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--forest-soft);
      background: var(--parchment-dim);
      border: 1px solid var(--line);
      padding: 2px 9px;
      border-radius: 100px;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      border: 1px solid var(--line);
      margin-bottom: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(15,61,46,0.05);
    }

    .card-bar {
      height: 4px;
      width: 100%;
    }

    .card.distributor .card-bar { background: var(--forest); }
    .card.buyer .card-bar { background: var(--brass); }

    .card-body {
      padding: 15px 16px 16px;
    }

    .card-name {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 17px;
      color: var(--ink);
      letter-spacing: -0.005em;
    }

    .card-details {
      color: #6b6b60;
      font-size: 13px;
      margin-top: 4px;
      font-family: 'IBM Plex Mono', monospace;
      letter-spacing: 0.01em;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 100px;
      margin-top: 10px;
    }

    .tag .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
    }

    .card.distributor .tag { background: rgba(15,61,46,0.08); color: var(--forest); }
    .card.distributor .tag .dot { background: var(--forest); }
    .card.buyer .tag { background: rgba(201,162,39,0.14); color: #8a6c14; }
    .card.buyer .tag .dot { background: var(--brass); }

    .contact-btn {
      margin-top: 12px;
      padding: 10px 10px;
      border: none;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      color: white;
      display: block;
      width: 100%;
      text-align: center;
      box-sizing: border-box;
    }

    .card.distributor .contact-btn { background: var(--forest); }
    .card.buyer .contact-btn { background: var(--rust); }

    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(15, 30, 22, 0.55);
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(2px);
    }

    .modal.active { display: flex; }

    .modal-box {
      background: var(--parchment);
      padding: 24px;
      border-radius: 18px;
      width: 100%;
      max-width: 340px;
      max-height: 85vh;
      overflow-y: auto;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .modal-box .modal-title {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 18px;
      margin-bottom: 14px;
      color: var(--ink);
    }

    .modal-box input {
      width: 100%;
      padding: 12px 13px;
      margin-top: 9px;
      border: 1px solid var(--line);
      border-radius: 10px;
      box-sizing: border-box;
      font-size: 14px;
      background: #fff;
      font-family: 'Inter', sans-serif;
    }

    .modal-box input:focus {
      outline: 2px solid var(--forest);
      outline-offset: 1px;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 18px;
    }

    .modal-box button {
      flex: 1;
      padding: 12px 14px;
      border: none;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
    }

    .submit-btn { background: var(--forest); color: white; }
    .cancel-btn { background: var(--parchment-dim); color: var(--ink); border: 1px solid var(--line) !important; }

    .status-msg {
      margin-top: 11px;
      font-size: 13px;
      color: var(--forest);
      font-family: 'IBM Plex Mono', monospace;
    }

    .loading-text {
      color: #8a8a7f;
      font-size: 14px;
      padding: 6px 0;
      font-family: 'IBM Plex Mono', monospace;
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <div class="brand-row">
      <div class="brand-mark">SM</div>
      <p class="brand">ShelfMatch</p>
    </div>
    <p class="tagline">Connecting distributors and buyers across Onitsha, Nnewi, Awka &amp; Asaba</p>
    <div class="register-row">
      <button class="register-btn" onclick="openRegisterModal('distributor')">Register as Distributor</button>
      <button class="register-btn" onclick="openRegisterModal('buyer')">Register as Buyer</button>
    </div>
    <div class="register-row" style="margin-top:8px;">
      <button class="register-btn" onclick="openHistoryModal()">My Inquiries</button>
    </div>
  </div>

  <div class="stitch"></div>

  <div class="section">
    <div class="section-header">
      <span class="eyebrow">Supply Side</span>
      <div class="section-header-row">
        <h2>Distributors</h2>
        <span class="count" id="distributor-count"></span>
      </div>
    </div>
    <div id="distributor-list"><div class="loading-text">Loading distributors…</div></div>
  </div>

  <div class="stitch"></div>

  <div class="section">
    <div class="section-header">
      <span class="eyebrow">Demand Side</span>
      <div class="section-header-row">
        <h2>Buyers</h2>
        <span class="count" id="buyer-count"></span>
      </div>
    </div>
    <div id="buyer-list"><div class="loading-text">Loading buyers…</div></div>
  </div>

  <div class="modal" id="inquiry-modal">
    <div class="modal-box">
      <div class="modal-title" id="modal-title">Contact</div>
      <input type="text" id="inquiry-name" placeholder="Your name">
      <input type="text" id="inquiry-phone" placeholder="Your phone number">
      <div class="modal-actions">
        <button class="submit-btn" onclick="submitInquiry()">Send</button>
        <button class="cancel-btn" onclick="closeModal()">Cancel</button>
      </div>
      <div class="status-msg" id="status-msg"></div>
    </div>
  </div>

  <div class="modal" id="register-modal">
    <div class="modal-box">
      <div class="modal-title" id="register-modal-title">Register</div>
      <input type="text" id="register-name" placeholder="Business / your name">
      <input type="text" id="register-location" placeholder="Location (e.g. Onitsha)">
      <input type="text" id="register-extra" placeholder="Category">
      <div class="modal-actions">
        <button class="submit-btn" onclick="submitRegister()">Register</button>
        <button class="cancel-btn" onclick="closeRegisterModal()">Cancel</button>
      </div>
      <div class="status-msg" id="register-status-msg"></div>
    </div>
  </div>

  <div class="modal" id="history-modal">
    <div class="modal-box">
      <div class="modal-title">My Inquiries</div>
      <div id="history-list" style="margin-top:4px;"></div>
      <div class="modal-actions">
        <button class="cancel-btn" onclick="closeHistoryModal()" style="flex:1;">Close</button>
      </div>
    </div>
  </div>

  <script>
    let selectedContactName = "";
    let selectedContactType = "";
    let registerType = "";

    function openModal(contactName, contactType) {
      selectedContactName = contactName;
      selectedContactType = contactType;
      document.getElementById("modal-title").innerText = "Contact " + contactName;
      document.getElementById("status-msg").innerText = "";
      document.getElementById("inquiry-modal").classList.add("active");
    }

    function closeModal() {
      document.getElementById("inquiry-modal").classList.remove("active");
    }

    function submitInquiry() {
      const name = document.getElementById("inquiry-name").value;
      const phone = document.getElementById("inquiry-phone").value;

      if (!name || !phone) {
        document.getElementById("status-msg").innerText = "Please fill in both fields.";
        return;
      }

      fetch("https://shelfmatch-backend-5mjl.vercel.app/api/inquiries", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          secret: "shelfmatch-2026-secure",
          name,
          phone,
          distributor: selectedContactType === "distributor" ? selectedContactName : "",
          buyer: selectedContactType === "buyer" ? selectedContactName : "",
          contactType: selectedContactType,
        }),
      })
        .then(response => response.json())
        .then(data => {
          saveInquiryToHistory(selectedContactName, selectedContactType);
          document.getElementById("status-msg").innerText = "Sent! We'll be in touch.";
          document.getElementById("inquiry-name").value = "";
          document.getElementById("inquiry-phone").value = "";
          setTimeout(closeModal, 1500);
        })
        .catch(error => {
          document.getElementById("status-msg").innerText = "Something went wrong. Try again.";
          console.error(error);
        });
    }

    function saveInquiryToHistory(contactName, contactType) {
      try {
        const existing = JSON.parse(localStorage.getItem("shelfmatch_history") || "[]");
        existing.unshift({
          name: contactName,
          type: contactType,
          date: new Date().toLocaleString(),
        });
        localStorage.setItem("shelfmatch_history", JSON.stringify(existing.slice(0, 50)));
      } catch (e) {
        console.error("Could not save history:", e);
      }
    }

    function openHistoryModal() {
      const list = document.getElementById("history-list");
      let history = [];
      try {
        history = JSON.parse(localStorage.getItem("shelfmatch_history") || "[]");
      } catch (e) {
        history = [];
      }

      if (history.length === 0) {
        list.innerHTML = '<div class="loading-text">No inquiries sent yet on this device.</div>';
      } else {
        list.innerHTML = history.map(item => `
          <div style="padding:10px 0;border-bottom:1px dashed var(--line);">
            <div style="font-family:'Fraunces',serif;font-weight:600;font-size:15px;">${item.name}</div>
            <div class="mono" style="font-size:11px;color:#8a8a7f;margin-top:2px;">${item.type === 'distributor' ? 'Contacted distributor' : 'Contacted buyer'} · ${item.date}</div>
          </div>
        `).join("");
      }

      document.getElementById("history-modal").classList.add("active");
    }

    function closeHistoryModal() {
      document.getElementById("history-modal").classList.remove("active");
    }

    function openRegisterModal(type) {
      registerType = type;
      const title = type === "distributor" ? "Register as Distributor" : "Register as Buyer";
      document.getElementById("register-modal-title").innerText = title;
      document.getElementById("register-extra").placeholder = type === "distributor" ? "Category (e.g. Dairy)" : "Looking for (e.g. Dairy)";
      document.getElementById("register-status-msg").innerText = "";
      document.getElementById("register-modal").classList.add("active");
    }

    function closeRegisterModal() {
      document.getElementById("register-modal").classList.remove("active");
    }

    function submitRegister() {
      const name = document.getElementById("register-name").value;
      const location = document.getElementById("register-location").value;
      const extra = document.getElementById("register-extra").value;

      if (!name || !location || !extra) {
        document.getElementById("register-status-msg").innerText = "Please fill in all fields.";
        return;
      }

      fetch("https://shelfmatch-backend-5mjl.vercel.app/api/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          secret: "shelfmatch-2026-secure",
          registerType,
          name,
          location,
          category: registerType === "distributor" ? extra : "",
          lookingFor: registerType === "buyer" ? extra : "",
        }),
      })
        .then(response => response.json())
        .then(data => {
          document.getElementById("register-status-msg").innerText = "Registered! Refresh to see your listing.";
          document.getElementById("register-name").value = "";
          document.getElementById("register-location").value = "";
          document.getElementById("register-extra").value = "";
          setTimeout(closeRegisterModal, 1800);
        })
        .catch(error => {
          document.getElementById("register-status-msg").innerText = "Something went wrong. Try again.";
          console.error(error);
        });
    }

    fetch("https://shelfmatch-backend-5mjl.vercel.app/api/distributors")
      .then(response => response.json())
      .then(data => {
        const list = document.getElementById("distributor-list");
        list.innerHTML = "";
        document.getElementById("distributor-count").innerText = data.distributors.length;

        data.distributors.forEach(d => {
          const card = document.createElement("div");
          card.className = "card distributor";
          card.innerHTML = `
            <div class="card-bar"></div>
            <div class="card-body">
              <div class="card-name">${d.NAME}</div>
              <div class="card-details">${d["LOCATION "]} — ${d["CATEGORY "]}</div>
              <span class="tag"><span class="dot"></span>Distributor</span>
              <button class="contact-btn" onclick="openModal('${d.NAME}', 'distributor')">Contact this distributor</button>
            </div>
          `;
          list.appendChild(card);
        });
      })
      .catch(error => {
        document.getElementById("distributor-list").innerHTML = '<div class="loading-text">Could not load distributors.</div>';
        console.error(error);
      });

    fetch("https://shelfmatch-backend-5mjl.vercel.app/api/buyers")
      .then(response => response.json())
      .then(data => {
        const list = document.getElementById("buyer-list");
        list.innerHTML = "";
        document.getElementById("buyer-count").innerText = data.buyers.length;

        data.buyers.forEach(b => {
          const card = document.createElement("div");
          card.className = "card buyer";
          card.innerHTML = `
            <div class="card-bar"></div>
            <div class="card-body">
              <div class="card-name">${b.NAME}</div>
              <div class="card-details">${b.LOCATION} — ${b.LOOKING_FOR}</div>
              <span class="tag"><span class="dot"></span>Buyer</span>
              <button class="contact-btn" onclick="openModal('${b.NAME}', 'buyer')">Contact this buyer</button>
            </div>
          `;
          list.appendChild(card);
        });
      })
      .catch(error => {
        document.getElementById("buyer-list").innerHTML = '<div class="loading-text">Could not load buyers.</div>';
        console.error(error);
      });

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js");
    }
  </script>

</body>
</html>
